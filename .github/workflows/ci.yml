name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, Type-Check & Test
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy_anon_key
      SUPABASE_SERVICE_ROLE_KEY: dummy_service_key
      PINECONE_API_KEY: dummy_pinecone_key
      OPENROUTER_API_KEY: dummy_openrouter_key
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Check for trailing whitespace
        run: |
          if grep -rn "[[:space:]]$" lib/ __tests__/ --include="*.ts"; then
            echo "ERROR: Trailing whitespace found. Run the cleanup command."
            exit 1
          fi

  build-check:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy_anon_key

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
